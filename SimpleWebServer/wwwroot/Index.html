<!DOCTYPE html>

<html lang="de">

<head>

    <meta charset="utf-8" />

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0" />

    <title>Simple WebServer</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.7/signalr.min.js"></script>

    <script defer src="app.js"></script>

    <style>

        body {
            font-family: Arial, Helvetica, sans-serif;
            margin: 30px;
        }

        h1 {
            margin-bottom: 30px;
        }

        h2 {
            margin-top: 35px;
        }

        .row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        input {
            width: 250px;
            padding: 5px;
        }

        #result {
            margin-top: 10px;
            padding: 10px;
            border: 1px solid #cccccc;
            background-color: #f8f8f8;
            min-height: 45px;
        }

        #connectionState {
            font-weight: bold;
            color: green;
        }
    </style>

</head>

<body>

    <h1>Simple WebServer Demo V2</h1>

    <p>
        SignalR:
        <span id="connectionState">Nicht verbunden</span>
    </p>

    <hr />

    <h2>Hello World</h2>

    <div class="row">

        <input id="text" type="text" />

        <button id="btnSave">Speichern</button>

    </div>

    <div id="result"></div>

    <hr />

    <h2>System</h2>

    <div class="row">

        <input id="machineName" type="text" readonly />

        <button id="btnMachineName">Rechnername lesen</button>

    </div>

    <hr />

    <h2>Uhr</h2>

    <div class="row">

        <input id="currentTime" type="text" readonly />

        <button id="btnTime">Uhrzeit lesen</button>

    </div>

    <hr />

    <h2>Fritz! Samrt Home Aktor</h2>

</body>

</html>
