<!DOCTYPE html>

<html lang="de">

<head>

    <meta charset="utf-8" />

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0" />

    <title>Simple WebServer</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.7/signalr.min.js"></script>

    <script defer src="/js/dashboard.js"></script>

    <style>

        body {font-family: Arial, Helvetica, sans-serif; margin: 30px; }

        h1 {margin-bottom: 30px;}

        h2 {margin-top: 35px;}

        .row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        input { width: 250px; padding: 5px;}

        #result {
            margin-top: 10px;
            padding: 10px;
            border: 1px solid #cccccc;
            background-color: #f8f8f8;
            min-height: 45px;
        }

        #connectionState {font-weight: bold; color: green; }
    </style>

</head>

<body>

    <h1>Simple WebServer Demo V3 (Dashboard)</h1>

    <p>
        SignalR:
        <span id="connectionState">Nicht verbunden</span>
    </p>

    <h2>SmartHome Aktor</h2>

    <table>

        <tr>
            <td>Leistung</td>
            <td>
                <input id="currentPower" readonly />
            </td>
        </tr>

        <tr>
            <td>Spannung</td>
            <td>
                <input id="currentVolt" readonly />
            </td>
        </tr>

        <tr>
            <td>Temperatur</td>
            <td>
                <input id="currentTemperature" readonly />
            </td>
        </tr>

    </table>
</body>

</html>
